<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>P51 / LAB</title>
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <style>
    :root {
      --bg:    #0b0b0b;
      --fg:    #e8e8e8;
      --dim:   rgba(232, 232, 232, 0.55);
      --line:  rgba(232, 232, 232, 0.16);
      --lime:  rgb(200, 255, 0);
      --warn:  #ffaa55;
      --mono:  ui-monospace, "SF Mono", Menlo, Consolas, monospace;

      /* Tunables read by pointcloud-grid.mjs */
      --portrait-color:        #c8ff00;
      --portrait-color-cold:   #c8ff00;  /* lime even at rest — visible without hover */
      --portrait-color-dark:   #1a1a1a;
      --portrait-point-size:   1.6;
      --portrait-depth:        0.5;
      --portrait-noise:        0.03;
      --portrait-mouse-force:  0.25;
      --portrait-parallax:     0.18;
      --portrait-lum-cutoff:   0.98;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 13px; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--line);
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    }
    .brand { color: var(--fg); }
    .topbar-right { display: flex; align-items: center; gap: 16px; color: var(--dim); }
    .topbar-right button {
      background: transparent; border: 1px solid var(--line); border-radius: 100px;
      color: var(--dim); font-family: inherit; font-size: 9px; letter-spacing: 0.22em;
      padding: 5px 12px; cursor: pointer; text-transform: uppercase;
    }
    .topbar-right button:hover { color: var(--fg); border-color: var(--fg); }

    .layout { display: grid; grid-template-columns: 1fr 280px; height: calc(100vh - 51px); }

    .stage { position: relative; display: grid; grid-template-rows: 1fr auto; }
    .stage-canvas-wrap { position: relative; min-height: 0; }
    .stage-canvas-wrap canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    .empty {
      position: absolute; inset: 0; display: grid; place-items: center;
      color: var(--dim); font-size: 11px; letter-spacing: 0.1em; text-align: center;
      pointer-events: none;
    }
    .empty.hidden { display: none; }

    .promptbar {
      display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--line); align-items: center;
    }
    .promptbar input[type=text] {
      flex: 1; background: transparent; border: 1px solid var(--line); border-radius: 4px;
      color: var(--fg); font-family: inherit; font-size: 13px; padding: 10px 14px; outline: none;
    }
    .promptbar input[type=text]:focus { border-color: var(--lime); }
    .promptbar button[type=submit] {
      background: transparent; border: 1px solid rgba(200, 255, 0, 0.55); border-radius: 100px;
      color: var(--lime); font-family: inherit; font-size: 9px; letter-spacing: 0.22em;
      text-transform: uppercase; padding: 11px 22px; cursor: pointer; transition: all 0.15s;
      align-self: stretch; flex: 0 0 auto;
    }
    .promptbar button[type=submit]:hover:not(:disabled) { background: rgba(200, 255, 0, 0.1); border-color: var(--lime); }
    .promptbar button[type=submit]:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Reference-image picker */
    .ref-pick {
      width: 38px; height: 38px; border-radius: 4px;
      border: 1px dashed var(--line); background: transparent;
      color: var(--dim); cursor: pointer; padding: 0; flex: 0 0 38px;
      display: grid; place-items: center; transition: all 0.15s;
    }
    .ref-pick svg { width: 18px; height: 18px; display: block; }
    .ref-pick:hover { border-color: var(--lime); color: var(--lime); }
    .ref-thumb-wrap {
      position: relative; flex: 0 0 38px; width: 38px; height: 38px;
    }
    .ref-thumb {
      width: 38px; height: 38px; border-radius: 4px; object-fit: cover;
      border: 1px solid rgba(200, 255, 0, 0.55); display: block;
    }
    .ref-thumb-clear {
      position: absolute; top: -6px; right: -6px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--line);
      color: var(--fg); cursor: pointer; padding: 0;
      font-size: 10px; line-height: 1; display: grid; place-items: center;
    }
    .ref-thumb-clear:hover { color: #ff7a7a; border-color: #ff7a7a; }
    .promptbar button:disabled { opacity: 0.4; cursor: not-allowed; }

    .sidebar {
      border-left: 1px solid var(--line); display: grid; grid-template-rows: auto auto 1fr; min-height: 0;
    }
    .sidebar-head {
      padding: 14px 16px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--dim); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-list { overflow-y: auto; padding: 6px; }

    /* Controls panel — sits above the history list */
    .controls { padding: 14px 16px 16px; border-bottom: 1px solid var(--line); }
    .control { margin-bottom: 12px; }
    .control:last-child { margin-bottom: 0; }
    .control-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px;
    }
    .control-label span:last-child { color: var(--fg); font-variant-numeric: tabular-nums; }
    .control input[type=range] {
      width: 100%; height: 16px; background: transparent; padding: 0; margin: 0;
      -webkit-appearance: none; appearance: none; cursor: pointer;
    }
    .control input[type=range]::-webkit-slider-runnable-track {
      height: 1px; background: var(--line);
    }
    .control input[type=range]::-moz-range-track {
      height: 1px; background: var(--line);
    }
    .control input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--lime); border: 0; margin-top: -5.5px;
    }
    .control input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--lime); border: 0;
    }
    .control input[type=color] {
      width: 100%; height: 26px; padding: 0; border: 1px solid var(--line);
      background: transparent; border-radius: 3px; cursor: pointer;
    }
    .control input[type=color]::-webkit-color-swatch-wrapper { padding: 2px; }
    .control input[type=color]::-webkit-color-swatch { border: 0; border-radius: 2px; }

    /* Advanced controls toggle + collapsible group */
    .advanced-toggle {
      width: 100%; margin-top: 12px; padding: 8px 0;
      background: transparent; border: 0; border-top: 1px solid var(--line);
      color: var(--dim); font-family: inherit; font-size: 9px;
      letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: color 0.15s;
    }
    .advanced-toggle:hover { color: var(--fg); }
    .advanced-toggle .chev {
      display: inline-block; transition: transform 0.2s; font-size: 10px;
    }
    .advanced-toggle.open .chev { transform: rotate(90deg); }
    .advanced-group { display: none; padding-top: 8px; }
    .advanced-group.open { display: block; }
    .scene-item {
      position: relative;
      padding: 10px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: background 0.1s;
    }
    .scene-item:hover { background: rgba(232, 232, 232, 0.04); }
    .scene-item.active { background: rgba(200, 255, 0, 0.06); border-color: rgba(200, 255, 0, 0.25); }
    .scene-prompt { font-size: 11px; line-height: 1.35; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; padding-right: 18px; }
    .scene-meta   { font-size: 9px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; display: flex; justify-content: space-between; }
    .scene-meta .expires { color: var(--dim); }
    .scene-meta .expires.warn { color: var(--warn); }
    .scene-delete {
      position: absolute; top: 6px; right: 6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: transparent; border: 0;
      color: var(--dim); font-family: inherit; font-size: 14px; line-height: 1; padding: 0;
      cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .scene-item:hover .scene-delete { opacity: 1; }
    .scene-delete:hover { color: #ff7a7a; background: rgba(255, 122, 122, 0.1); }

    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: var(--bg); border: 1px solid var(--line); border-radius: 100px;
      padding: 8px 18px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--fg); pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
    .toast.warn { border-color: var(--warn); color: var(--warn); }
    .toast.err  { border-color: #ff7a7a; color: #ff7a7a; }

    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 200px; }
      .sidebar { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="brand">P51 / LAB</span>
    <div class="topbar-right">
      <span id="email"></span>
      <button id="signout">Sign out</button>
    </div>
  </header>

  <div class="layout">
    <section class="stage">
      <div class="stage-canvas-wrap">
        <canvas id="canvas"></canvas>
        <div class="empty" id="empty">Type a prompt below to generate your first scene.</div>
      </div>
      <form class="promptbar" id="promptForm">
        <button type="button" class="ref-pick" id="refPick" title="Attach a reference image (image-to-image)" aria-label="Attach reference image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
        </button>
        <span class="ref-thumb-wrap" id="refThumbWrap" hidden>
          <img class="ref-thumb" id="refThumb" alt="reference" />
          <button type="button" class="ref-thumb-clear" id="refClear" title="Remove reference" aria-label="Remove reference">×</button>
        </span>
        <input id="refFile" type="file" accept="image/png,image/jpeg,image/webp" hidden />
        <input id="prompt" type="text" placeholder="describe a scene… (or just attach an image)" autocomplete="off" />
        <button type="submit" id="go">Generate</button>
      </form>
    </section>

    <aside class="sidebar">
      <div class="controls">
        <div class="control">
          <div class="control-label"><span>Color</span></div>
          <input type="color" id="ctlColor" value="#c8ff00" />
        </div>
        <div class="control">
          <div class="control-label"><span>Particle size</span><span id="ctlSizeOut">1.6</span></div>
          <input type="range" id="ctlSize" min="0.4" max="4.0" step="0.1" value="1.6" />
        </div>
        <div class="control">
          <div class="control-label"><span>Density</span><span id="ctlDensityOut">0.98</span></div>
          <input type="range" id="ctlDensity" min="0.30" max="1.00" step="0.01" value="0.98" />
        </div>
        <button type="button" class="advanced-toggle" id="advToggle">
          <span>Advanced</span><span class="chev">▶</span>
        </button>
        <div class="advanced-group" id="advGroup">
          <div class="control">
            <div class="control-label"><span>Depth</span><span id="ctlDepthOut">0.50</span></div>
            <input type="range" id="ctlDepth" min="0.00" max="1.50" step="0.01" value="0.50" />
          </div>
          <div class="control">
            <div class="control-label"><span>Breathing / noise</span><span id="ctlNoiseOut">0.030</span></div>
            <input type="range" id="ctlNoise" min="0.000" max="0.150" step="0.001" value="0.030" />
          </div>
          <div class="control">
            <div class="control-label"><span>Mouse force</span><span id="ctlMouseOut">0.25</span></div>
            <input type="range" id="ctlMouse" min="0.00" max="1.00" step="0.01" value="0.25" />
          </div>
          <div class="control">
            <div class="control-label"><span>Parallax</span><span id="ctlParallaxOut">0.18</span></div>
            <input type="range" id="ctlParallax" min="0.00" max="0.60" step="0.01" value="0.18" />
          </div>
        </div>
      </div>
      <div class="sidebar-head">
        <span>History</span>
        <span id="count" style="color: var(--dim); letter-spacing: 0.15em;"></span>
      </div>
      <div class="sidebar-list" id="list"></div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { mountPointCloudFromGrid } from '/p51/lab/pointcloud-grid.mjs';

    // ── boot ──────────────────────────────────────────────────────────────
    const cfg = await (await fetch('/api/config')).json();
    const sb  = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    let { data: { session } } = await sb.auth.getSession();
    if (!session) { location.replace('/'); throw new Error('no session'); }
    document.getElementById('email').textContent = session.user.email || '';

    sb.auth.onAuthStateChange((_e, s) => {
      if (!s) location.replace('/');
      else session = s;
    });

    // ── helpers ───────────────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const toastEl = $('toast');
    let toastTimer = null;
    function toast(text, kind = '') {
      toastEl.textContent = text;
      toastEl.className = 'toast show ' + kind;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    async function api(method, path, body) {
      const res = await fetch('/api' + path, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + session.access_token,
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function fmtExpiry(ms) {
      const dt = ms - Date.now();
      if (dt <= 0) return 'expired';
      const h = Math.floor(dt / (60 * 60 * 1000));
      if (h < 1) return '< 1h';
      if (h < 24) return h + 'h';
      const d = Math.floor(h / 24);
      const rh = h % 24;
      return d + 'd' + (rh ? ' ' + rh + 'h' : '');
    }

    // ── point cloud renderer ──────────────────────────────────────────────
    let cloud = null;
    function ensureCloud() {
      if (cloud) return cloud;
      cloud = mountPointCloudFromGrid($('canvas'), { grid: null });
      // apply current control values to a freshly-mounted renderer
      cloud.setColor($('ctlColor').value);
      cloud.setSize($('ctlSize').value);
      // density is applied per-grid inside setGrid via the cutoff arg path,
      // but the var must be set before sampling so re-apply by calling setDensity
      // after the grid is loaded.
      return cloud;
    }

    // ── live controls ─────────────────────────────────────────────────────
    $('ctlColor').addEventListener('input', (e) => {
      document.documentElement.style.setProperty('--portrait-color',      e.target.value);
      document.documentElement.style.setProperty('--portrait-color-cold', e.target.value);
      if (cloud) cloud.setColor(e.target.value);
    });
    $('ctlSize').addEventListener('input', (e) => {
      $('ctlSizeOut').textContent = Number(e.target.value).toFixed(1);
      document.documentElement.style.setProperty('--portrait-point-size', e.target.value);
      if (cloud) cloud.setSize(e.target.value);
    });
    $('ctlDensity').addEventListener('input', (e) => {
      $('ctlDensityOut').textContent = Number(e.target.value).toFixed(2);
      document.documentElement.style.setProperty('--portrait-lum-cutoff', e.target.value);
      if (cloud) cloud.setDensity(e.target.value);
    });

    // Advanced toggle
    $('advToggle').addEventListener('click', () => {
      $('advToggle').classList.toggle('open');
      $('advGroup').classList.toggle('open');
    });
    $('ctlDepth').addEventListener('input', (e) => {
      $('ctlDepthOut').textContent = Number(e.target.value).toFixed(2);
      if (cloud) cloud.setDepth(e.target.value);
    });
    $('ctlNoise').addEventListener('input', (e) => {
      $('ctlNoiseOut').textContent = Number(e.target.value).toFixed(3);
      if (cloud) cloud.setNoise(e.target.value);
    });
    $('ctlMouse').addEventListener('input', (e) => {
      $('ctlMouseOut').textContent = Number(e.target.value).toFixed(2);
      if (cloud) cloud.setMouseForce(e.target.value);
    });
    $('ctlParallax').addEventListener('input', (e) => {
      $('ctlParallaxOut').textContent = Number(e.target.value).toFixed(2);
      // Parallax is read each frame from this CSS var by the renderer.
      document.documentElement.style.setProperty('--portrait-parallax', e.target.value);
    });

    function showScene(row) {
      $('empty').classList.add('hidden');
      const c = ensureCloud();
      c.setGrid({ lum: row.point_grid.lum, w: row.grid_w, h: row.grid_h });
      // re-apply current control values so the loaded scene reflects the live
      // controls (color/size are uniform-only; density re-samples geometry)
      c.setColor($('ctlColor').value);
      c.setSize($('ctlSize').value);
      c.setDensity($('ctlDensity').value);
      c.setDepth($('ctlDepth').value);
      c.setNoise($('ctlNoise').value);
      c.setMouseForce($('ctlMouse').value);
      document.documentElement.style.setProperty('--portrait-parallax', $('ctlParallax').value);
    }

    // ── history list ──────────────────────────────────────────────────────
    let scenes = [];
    let activeId = null;

    function renderList() {
      const list = $('list');
      list.innerHTML = '';
      $('count').textContent = scenes.length ? scenes.length + ' scene' + (scenes.length === 1 ? '' : 's') : '';
      const expiringSoon = scenes.find(s => s.expires_at - Date.now() < 24 * 60 * 60 * 1000);
      if (expiringSoon && !sessionStorage.getItem('warned_' + expiringSoon.id)) {
        toast('Some scenes expire within 24 hours', 'warn');
        sessionStorage.setItem('warned_' + expiringSoon.id, '1');
      }
      for (const s of scenes) {
        const div = document.createElement('div');
        div.className = 'scene-item' + (s.id === activeId ? ' active' : '');
        const expClass = (s.expires_at - Date.now() < 24 * 60 * 60 * 1000) ? 'warn' : '';
        div.innerHTML = `
          <button class="scene-delete" title="Delete scene" aria-label="Delete">×</button>
          <div class="scene-prompt"></div>
          <div class="scene-meta"><span></span><span class="expires ${expClass}"></span></div>
        `;
        div.querySelector('.scene-prompt').textContent = s.prompt;
        div.querySelector('.scene-meta span:first-child').textContent = new Date(s.created_at).toLocaleString();
        div.querySelector('.expires').textContent = 'expires ' + fmtExpiry(s.expires_at);
        div.addEventListener('click', () => loadAndShow(s.id));
        div.querySelector('.scene-delete').addEventListener('click', async (ev) => {
          ev.stopPropagation();
          if (!confirm('Delete this scene? This cannot be undone.')) return;
          try {
            await api('DELETE', '/scenes/' + s.id);
            scenes = scenes.filter(x => x.id !== s.id);
            if (activeId === s.id) {
              activeId = null;
              if (cloud) { cloud.destroy(); cloud = null; }
              setStatus('Type a prompt below to generate your first scene.');
            }
            renderList();
          } catch (e) {
            toast('Delete failed: ' + e.message, 'err');
          }
        });
        list.appendChild(div);
      }
    }

    async function refreshList() {
      try {
        const { scenes: rows } = await api('GET', '/scenes');
        scenes = rows || [];
        renderList();
      } catch (e) {
        toast('Could not load history: ' + e.message, 'err');
      }
    }

    async function loadAndShow(id) {
      try {
        const { scene } = await api('GET', '/scenes/' + id);
        activeId = id;
        renderList();
        showScene(scene);
      } catch (e) {
        toast('Could not load scene: ' + e.message, 'err');
      }
    }

    // ── generate (NDJSON streamed agent chain) ────────────────────────────
    function setStatus(text) {
      const el = $('empty');
      if (!text) { el.classList.add('hidden'); return; }
      el.textContent = text;
      el.classList.remove('hidden');
    }

    async function streamGenerate(prompt, refImageB64) {
      const res = await fetch('/api/scenes', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ prompt, refImage: refImageB64 || undefined }),
      });
      if (!res.ok || !res.body) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || `HTTP ${res.status}`);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let scene = null;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          let ev; try { ev = JSON.parse(line); } catch { continue; }
          if (ev.type === 'step')     setStatus('· ' + ev.step + (ev.iteration ? '  (pass ' + ev.iteration + ')' : '') + ' ·');
          if (ev.type === 'critique') setStatus('· score ' + ev.score.toFixed(1) + '/10  (pass ' + ev.iteration + ') ·');
          if (ev.type === 'error')    throw new Error(ev.error + (ev.detail ? ': ' + ev.detail : ''));
          if (ev.type === 'done')     scene = ev.scene;
        }
      }
      return scene;
    }

    // ── reference image picker ────────────────────────────────────────────
    let refImageB64 = null; // includes data: prefix; server strips it
    function clearRef() {
      refImageB64 = null;
      $('refFile').value = '';
      $('refThumbWrap').hidden = true;
      $('refPick').hidden = false;
    }
    $('refPick').addEventListener('click', () => $('refFile').click());
    $('refClear').addEventListener('click', clearRef);
    $('refFile').addEventListener('change', (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      if (f.size > 6 * 1024 * 1024) { toast('Image too large (max 6MB)', 'err'); $('refFile').value = ''; return; }
      const reader = new FileReader();
      reader.onload = () => {
        refImageB64 = reader.result; // data:image/png;base64,...
        $('refThumb').src = refImageB64;
        $('refThumbWrap').hidden = false;
        $('refPick').hidden = true;
      };
      reader.readAsDataURL(f);
    });

    $('promptForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = $('prompt').value.trim();
      // Either a prompt OR a reference image is enough. With just an image,
      // the server defaults the goal to "reproduce the reference faithfully".
      if (!prompt && !refImageB64) return;

      $('go').disabled = true;
      $('go').textContent = 'Generating…';
      $('empty').classList.remove('hidden');
      setStatus('· starting ·');
      try {
        const scene = await streamGenerate(prompt, refImageB64);
        if (!scene) throw new Error('no scene returned');
        $('prompt').value = '';
        clearRef();
        scenes.unshift({
          id: scene.id, prompt: scene.prompt, created_at: scene.created_at,
          expires_at: scene.expires_at, grid_w: scene.grid_w, grid_h: scene.grid_h,
        });
        activeId = scene.id;
        renderList();
        showScene(scene);
      } catch (err) {
        toast('Generation failed: ' + err.message, 'err');
        setStatus('Type a prompt below to generate your first scene.');
      } finally {
        $('go').disabled = false;
        $('go').textContent = 'Generate';
      }
    });

    // ── sign out ──────────────────────────────────────────────────────────
    $('signout').addEventListener('click', async () => {
      await sb.auth.signOut();
      location.replace('/');
    });

    // ── go ────────────────────────────────────────────────────────────────
    refreshList();
    // refresh expiry labels every minute
    setInterval(renderList, 60 * 1000);
  </script>
</body>
</html>
